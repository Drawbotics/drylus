name: CI
# Test + Release pipeline
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'packages/react-drylus/**'
      - 'packages/extract-emotion/**'
      - 'packages/vanilla-drylus/**'
      - 'packages/drylus-style-vars/**'
      - 'packages/icons/**'
      - '.github/workflows/ci.yml'
      - 'package.json'
  pull_request:
    branches:
      - '*'
    paths:
      - 'packages/react-drylus/**'
      - 'packages/extract-emotion/**'
      - 'packages/vanilla-drylus/**'
      - 'packages/drylus-style-vars/**'
      - 'packages/icons/**'
      - '.github/workflows/ci.yml'
      - 'package.json'

jobs:
  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://npm.pkg.github.com/
          scope: '@drawbotics'
      - run: echo 'Current ref = ${{ github.ref }}'
      - name: Install dependencies and run tests
        run: |
          npm run bootstrap
          npm run test
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}

  test-react-18:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://npm.pkg.github.com/
          scope: '@drawbotics'
      - name: Install dependencies and build libs
        run: |
          npm run bootstrap
          npm run build-libs
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}
      - name: Swap to React 18
        run: |
          # Install React 18 in a temp dir to avoid disrupting lerna's symlinks
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR" && npm init -y > /dev/null 2>&1
          npm install react@18 react-dom@18 react-test-renderer@18 2>&1
          # Replace only the react packages in root node_modules (where jest resolves them)
          for pkg in react react-dom react-test-renderer scheduler; do
            rm -rf "$GITHUB_WORKSPACE/node_modules/$pkg"
            [ -d "$TMPDIR/node_modules/$pkg" ] && cp -rL "$TMPDIR/node_modules/$pkg" "$GITHUB_WORKSPACE/node_modules/$pkg"
          done
          rm -rf "$TMPDIR"
      - name: Run react-drylus tests
        run: npm run test:react

  release:
    needs: test
    if: contains(github.ref, 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://npm.pkg.github.com/
          scope: '@drawbotics'
      - name: Install dependencies & build libs
        run: |
          npm run bootstrap
          npm run build-libs
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}

      - name: Prepare repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git checkout "${GITHUB_REF:11}"
          git remote rm origin
          git remote add origin "https://$GH_TOKEN@github.com/Drawbotics/drylus.git"
          git fetch origin
          git branch --set-upstream-to origin/master

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}
        if: contains(github.ref, 'master')
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NODE_AUTH_TOKEN }}" >> ~/.npmrc
          git remote -v
          git checkout -- .
          npm run release
