name: CI

on:
  push:
    branches:
      - master
    paths:
      - 'packages/react-drylus/**'
      - 'packages/extract-emotion/**'
      - 'packages/vanilla-drylus/**'
      - 'packages/drylus-style-vars/**'
      - 'packages/icons/**'
  pull_request:
    branches:
      - '*'
    paths:
      - 'packages/react-drylus/**'
      - 'packages/extract-emotion/**'
      - 'packages/vanilla-drylus/**'
      - 'packages/drylus-style-vars/**'
      - 'packages/icons/**'

jobs:
  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://npm.pkg.github.com/
          scope: '@drawbotics'
      - run: echo 'Current ref = ${{ github.ref }}'
      - name: Install dependencies
        run: |
          npm run bootstrap
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}
      - name: Debug emotion version
        run: |
          echo "=== Root node_modules ==="
          cat node_modules/emotion/package.json 2>/dev/null | grep '"version"' || echo "emotion not in root node_modules"
          echo "=== react-drylus node_modules ==="
          cat packages/react-drylus/node_modules/emotion/package.json 2>/dev/null | grep '"version"' || echo "emotion not in react-drylus node_modules"
          echo "=== react-drylus package.json emotion line ==="
          grep emotion packages/react-drylus/package.json
          echo "=== npm ls emotion ==="
          npm ls emotion 2>&1 || true
          echo "=== .npmrc ==="
          cat .npmrc 2>/dev/null || echo "no .npmrc"
      - name: Fix emotion version if needed
        run: |
          cd packages/react-drylus && npm install emotion@10.0.27 --save --save-exact && cd ../..
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}
      - name: Run tests
        run: |
          npm run test
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}

  release:
    needs: test
    if: contains(github.ref, 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: https://npm.pkg.github.com/
          scope: '@drawbotics'
      - name: Install dependencies & build libs
        run: |
          npm run bootstrap
          npm run build-libs
        env:
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}

      - name: Prepare repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git checkout "${GITHUB_REF:11}"
          git remote rm origin
          git remote add origin "https://$GH_TOKEN@github.com/drawbotics/drylus.git"
          git fetch origin
          git branch --set-upstream-to origin/master

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{secrets.GH_TOKEN}}
        if: contains(github.ref, 'master')
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NODE_AUTH_TOKEN }}" >> ~/.npmrc
          git remote -v
          git checkout -- .
          npm run release
